<div class="container mt-4">
  <h2>Prendre rendez-vous</h2>

  <form [formGroup]="form" (ngSubmit)="prendreRdv()" class="card p-3">
    <div class="mb-3">
      <label class="form-label">Date</label>
      <input
        type="date"
        class="form-control"
        formControlName="date"
        (change)="chargerCreneaux()">
    </div>

    <div class="mb-3">
      <label class="form-label">Créneau</label>
      <select class="form-control" formControlName="heureDebut">
        <option value="">Choisir un créneau</option>

        <option
          *ngFor="let creneau of creneaux()"
          [value]="creneau.heureDebut"
          [disabled]="!creneau.disponible">
          {{ creneau.heureDebut }} - {{ creneau.heureFin }}
          {{ creneau.disponible ? 'Disponible' : 'Occupé' }}
        </option>
      </select>
    </div>

    <button class="btn btn-primary" [disabled]="form.invalid || loading()">
      {{ loading() ? 'Confirmation...' : 'Confirmer' }}
    </button>
  </form>

  <div class="alert alert-success mt-3" *ngIf="message()">{{ message() }}</div>
  <div class="alert alert-danger mt-3" *ngIf="erreur()">{{ erreur() }}</div>
</div>
