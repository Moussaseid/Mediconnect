<div class="container mt-4">
  <h2>Mes rendez-vous</h2>

  <div class="alert alert-danger" *ngIf="erreur()">{{ erreur() }}</div>

  <table class="table table-striped" *ngIf="rdvs().length > 0; else aucunRdv">
    <thead>
      <tr>
        <th>Date</th>
        <th>Médecin</th>
        <th>Spécialité</th>
        <th>Statut</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let rdv of rdvs()">
        <td>{{ rdv.dateHeure }}</td>
        <td>{{ rdv.medecin?.prenom }} {{ rdv.medecin?.nom }}</td>
        <td>{{ rdv.medecin?.specialisationLibelle }}</td>
        <td>
          <span
            class="badge"
            [ngClass]="rdv.statut === 'confirme' ? 'bg-success' : 'bg-danger'">
            {{ rdv.statut }}
          </span>
        </td>
      </tr>
    </tbody>
  </table>

  <ng-template #aucunRdv>
    <p>Aucun rendez-vous trouvé.</p>
  </ng-template>
</div>
