<!-- src/app/features/auth/register/register.component.html -->
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light py-4">
  <div class="card shadow-sm" style="width: 100%; max-width: 500px;">
    <div class="card-body p-4">

      <!-- En-tête -->
      <div class="text-center mb-4">
        <h1 class="h4 fw-bold text-primary">Créer un compte patient</h1>
        <p class="text-muted small">Accédez à votre espace MediConnect</p>
      </div>

      <!-- Indicateur de progression -->
      <div class="d-flex align-items-center mb-4 gap-2">
        @for (n of [1, 2, 3]; track n) {
          <div class="d-flex align-items-center" [class.flex-grow-1]="n < 3">
            <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold"
                 style="width:32px;height:32px;font-size:.85rem;flex-shrink:0"
                 [class.bg-primary]="etape() >= n"
                 [class.text-white]="etape() >= n"
                 [class.bg-light]="etape() < n"
                 [class.border]="etape() < n"
                 [class.text-muted]="etape() < n">
              @if (etape() > n) {
                <i class="bi bi-check"></i>
              } @else {
                {{ n }}
              }
            </div>
            @if (n < 3) {
              <div class="flex-grow-1 mx-1" style="height:2px"
                   [class.bg-primary]="etape() > n"
                   [class.bg-light]="etape() <= n"
                   [style.border]="etape() <= n ? '1px dashed #dee2e6' : 'none'">
              </div>
            }
          </div>
        }
      </div>

      <!-- Labels des étapes -->
      <div class="d-flex justify-content-between text-muted mb-4" style="font-size:.75rem">
        <span [class.fw-semibold]="etape() === 1" [class.text-primary]="etape() === 1">Identité</span>
        <span [class.fw-semibold]="etape() === 2" [class.text-primary]="etape() === 2">Sécurité</span>
        <span [class.fw-semibold]="etape() === 3" [class.text-primary]="etape() === 3">Coordonnées</span>
      </div>

      <!-- Étapes -->
      @if (etape() === 1) {
        <app-register-step1
          [valeurs]="step1"
          (suivant)="etape1Valide($event)" />
      }

      @if (etape() === 2) {
        <app-register-step2
          [valeurs]="step2"
          (suivant)="etape2Valide($event)"
          (precedent)="retourEtape1()" />
      }

      @if (etape() === 3) {
        <app-register-step3
          [valeurs]="step3"
          [loading]="loading()"
          [erreur]="erreur()"
          (valide)="etape3Valide($event)"
          (precedent)="retourEtape2()" />
      }

      <!-- Lien connexion -->
      <hr class="my-3">
      <p class="text-center text-muted small mb-0">
        Déjà inscrit ? <a routerLink="/login">Se connecter</a>
      </p>

    </div>
  </div>
</div>
