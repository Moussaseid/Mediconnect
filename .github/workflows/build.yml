name: Build & Deploy

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  # ── Build Angular production ──────────────────────────────────────────────
  angular-build:
    name: ng build --prod
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build production
        working-directory: frontend
        run: npm run build -- --configuration=production

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 14

  # ── Vérification PHP complète ─────────────────────────────────────────────
  php-verify:
    name: PHP lint + syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Syntax check all PHP
        run: find src config public routes.php -name '*.php' -print0 | xargs -0 -n1 php -l

      - run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Verify autoloader resolves controllers
        run: |
          php -r "
            define('ROOT', getcwd());
            require_once 'config/config.php';
            echo class_exists('controllers\\\api\\\AuthApiController')    ? 'AuthApiController OK' . PHP_EOL : 'MISSING AuthApiController' . PHP_EOL;
            echo class_exists('controllers\\\api\\\AdminApiController')   ? 'AdminApiController OK' . PHP_EOL : 'MISSING AdminApiController' . PHP_EOL;
            echo class_exists('controllers\\\api\\\PasswordApiController')? 'PasswordApiController OK' . PHP_EOL : 'MISSING PasswordApiController' . PHP_EOL;
          " 2>/dev/null || true

  # ── Rapport de sécurité global ────────────────────────────────────────────
  security-report:
    name: Security scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.2' }

      - name: npm audit (frontend)
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps --silent
          npm audit --json > /tmp/npm-audit.json || true
          echo "## npm audit" && npm audit --audit-level=moderate || true

      - name: Composer audit (backend)
        run: |
          composer install --no-interaction --prefer-dist --quiet
          composer audit || true

      - name: Check .env.example has no real secrets
        run: |
          if grep -E "^JWT_SECRET=[a-zA-Z0-9+/]{20,}" .env.example; then
            echo "::error::Secret réel détecté dans .env.example !"
            exit 1
          fi
          echo ".env.example OK — pas de secret réel"

  # ── Notification résumé ───────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [angular-build, php-verify]
    if: always()

    steps:
      - name: Résumé du pipeline
        run: |
          echo "## Résultat CI — ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Résultat |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Angular build prod | ${{ needs.angular-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PHP lint+autoload  | ${{ needs.php-verify.result }} |" >> $GITHUB_STEP_SUMMARY
